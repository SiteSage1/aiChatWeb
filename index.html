<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoChat AI - Complex Chat Interface</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .chat-container { scrollbar-width: thin; scrollbar-color: #4b5563 #1f2937; }
    .message { max-width: 85%; }
    .typing::after { content: ''; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .code-block { background: #1f2937; border-radius: 8px; padding: 12px; font-family: monospace; overflow-x: auto; }
  </style>
</head>
<body class="bg-gray-950 text-gray-200 flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <div class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col">
    <div class="p-4 border-b border-gray-800">
      <button onclick="newChat()" 
              class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-xl font-medium transition">
        <i class="fas fa-plus"></i> New Chat
      </button>
    </div>

    <div class="flex-1 overflow-y-auto p-3 chat-container" id="chat-list">
      <!-- Chat history populated by JS -->
    </div>

    <div class="p-4 border-t border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white font-bold">S</div>
        <div>
          <p class="font-medium">Suranga</p>
          <p class="text-xs text-gray-500">Free Plan</p>
        </div>
      </div>
      <button onclick="toggleSettings()" 
              class="mt-6 w-full flex items-center gap-2 text-gray-400 hover:text-white py-2 px-3 rounded-lg hover:bg-gray-800">
        <i class="fas fa-cog"></i> Settings
      </button>
    </div>
  </div>

  <!-- Main Chat Area -->
  <div class="flex-1 flex flex-col">
    <!-- Top Bar -->
    <div class="h-14 border-b border-gray-800 bg-gray-900 flex items-center justify-between px-6">
      <div class="flex items-center gap-4">
        <h1 class="font-semibold text-lg" id="current-chat-title">New Conversation</h1>
      </div>
      
      <div class="flex items-center gap-4">
        <select id="model-select" onchange="changeModel()" 
                class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-1.5 text-sm focus:outline-none focus:border-blue-500">
          <option value="grok">Grok (xAI)</option>
          <option value="gpt4">GPT-4o</option>
          <option value="claude">Claude 3.5 Sonnet</option>
          <option value="gemini">Gemini 2.0</option>
        </select>
        
        <button onclick="toggleSettings()" class="text-gray-400 hover:text-white">
          <i class="fas fa-sliders-h"></i>
        </button>
      </div>
    </div>

    <!-- Messages Area -->
    <div id="messages" class="flex-1 overflow-y-auto p-6 chat-container space-y-8 bg-gray-950">
      <!-- Messages added by JavaScript -->
      <div class="text-center text-gray-500 text-sm mt-12">
        <i class="fas fa-sparkles text-3xl mb-3 text-blue-400"></i>
        <p class="font-medium">How can I help you today?</p>
      </div>
    </div>

    <!-- Input Area -->
    <div class="p-6 bg-gray-900 border-t border-gray-800">
      <div class="max-w-4xl mx-auto">
        <!-- File preview -->
        <div id="file-preview" class="hidden mb-3 flex items-center gap-2 bg-gray-800 rounded-xl p-3 text-sm">
          <i class="fas fa-paperclip text-blue-400"></i>
          <span id="file-name" class="flex-1 truncate"></span>
          <button onclick="removeFile()" class="text-red-400 hover:text-red-500"><i class="fas fa-times"></i></button>
        </div>

        <div class="relative">
          <textarea id="user-input" rows="1"
                    class="w-full bg-gray-800 border border-gray-700 rounded-3xl py-5 px-6 pr-28 resize-none focus:outline-none focus:border-blue-500 text-base"
                    placeholder="Ask anything..."></textarea>
          
          <div class="absolute right-4 bottom-4 flex items-center gap-2">
            <button onclick="attachFile()" class="p-3 text-gray-400 hover:text-white hover:bg-gray-700 rounded-2xl transition">
              <i class="fas fa-paperclip"></i>
            </button>
            <button onclick="sendMessage()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-2xl transition flex items-center justify-center w-11 h-11">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
        
        <p class="text-center text-xs text-gray-500 mt-3">NeoChat can make mistakes. Consider checking important info.</p>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-3xl w-full max-w-md p-8">
      <h2 class="text-2xl font-semibold mb-6">Chat Settings</h2>
      
      <div class="space-y-6">
        <div>
          <label class="block text-sm text-gray-400 mb-2">Temperature</label>
          <input type="range" id="temp-slider" min="0" max="1" step="0.1" value="0.7" 
                 class="w-full accent-blue-500">
          <div class="flex justify-between text-xs text-gray-500">
            <span>Precise</span><span>Creative</span>
          </div>
        </div>
        
        <div>
          <label class="block text-sm text-gray-400 mb-2">Max Tokens</label>
          <input type="number" id="max-tokens" value="4096" 
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3">
        </div>
      </div>

      <div class="mt-10 flex gap-3">
        <button onclick="toggleSettings()" 
                class="flex-1 py-4 bg-gray-800 hover:bg-gray-700 rounded-2xl">Cancel</button>
        <button onclick="saveSettings();toggleSettings()" 
                class="flex-1 py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl">Save Settings</button>
      </div>
    </div>
  </div>

  <script>
    // State
    let currentChatId = null;
    let chats = JSON.parse(localStorage.getItem('chats')) || {};
    let currentFile = null;

    // Render chat list
    function renderChatList() {
      const list = document.getElementById('chat-list');
      list.innerHTML = '';
      
      Object.keys(chats).sort((a,b) => chats[b].timestamp - chats[a].timestamp).forEach(id => {
        const chat = chats[id];
        const div = document.createElement('div');
        div.className = `group px-4 py-3 rounded-2xl hover:bg-gray-800 cursor-pointer flex items-center gap-3 ${id === currentChatId ? 'bg-gray-800' : ''}`;
        div.innerHTML = `
          <i class="fas fa-message text-gray-400"></i>
          <div class="flex-1 truncate text-sm">${chat.title}</div>
          <button onclick="deleteChat('${id}');event.stopImmediatePropagation()" 
                  class="hidden group-hover:block text-red-400 hover:text-red-500">
            <i class="fas fa-trash"></i>
          </button>
        `;
        div.onclick = () => loadChat(id);
        list.appendChild(div);
      });
    }

    function newChat() {
      currentChatId = 'chat-' + Date.now();
      chats[currentChatId] = {
        title: "New Conversation",
        messages: [],
        timestamp: Date.now(),
        model: document.getElementById('model-select').value
      };
      document.getElementById('messages').innerHTML = `
        <div class="text-center text-gray-500 text-sm mt-12">
          <i class="fas fa-sparkles text-3xl mb-3 text-blue-400"></i>
          <p class="font-medium">How can I help you today?</p>
        </div>`;
      document.getElementById('current-chat-title').textContent = "New Conversation";
      saveChats();
      renderChatList();
    }

    function loadChat(id) {
      currentChatId = id;
      const chat = chats[id];
      document.getElementById('current-chat-title').textContent = chat.title;
      document.getElementById('model-select').value = chat.model || 'grok';
      
      const container = document.getElementById('messages');
      container.innerHTML = '';
      
      chat.messages.forEach(msg => {
        addMessageToUI(msg.role, msg.content, false);
      });
      renderChatList();
    }

    function deleteChat(id) {
      if (confirm("Delete this chat?")) {
        delete chats[id];
        if (currentChatId === id) newChat();
        saveChats();
        renderChatList();
      }
    }

    function saveChats() {
      localStorage.setItem('chats', JSON.stringify(chats));
    }

    // Add message to UI
    function addMessageToUI(role, content, isNew = true) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message`;
      
      if (role === 'user') {
        div.innerHTML = `
          <div class="bg-blue-600 text-white px-6 py-4 rounded-3xl rounded-tr-none max-w-xl">
            ${content}
          </div>`;
      } else {
        div.innerHTML = `
          <div class="flex gap-4">
            <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-white flex-shrink-0">
              <i class="fas fa-robot"></i>
            </div>
            <div class="bg-gray-900 px-6 py-4 rounded-3xl rounded-tl-none prose prose-invert max-w-2xl">
              ${marked.parse(content)}
            </div>
          </div>`;
      }
      
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    // Simulated streaming response
    async function simulateStreamingResponse(userMessage) {
      const responses = {
        "hello": "Hello! I'm NeoChat, powered by advanced AI models. How can I assist you today?",
        "hi": "Hi there! What would you like to talk about?",
        "weather": "I'm afraid I don't have real-time weather data right now, but I can help you with many other topics!"
      };
      
      let reply = responses[userMessage.toLowerCase()] || 
        `That's an interesting question about "${userMessage}". In a real implementation, this would be a streamed response from Grok, GPT-4o, or another model.`;
      
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `flex justify-start message`;
      div.innerHTML = `
        <div class="flex gap-4">
          <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-white flex-shrink-0">
            <i class="fas fa-robot"></i>
          </div>
          <div id="streaming-text" class="bg-gray-900 px-6 py-4 rounded-3xl rounded-tl-none prose prose-invert max-w-2xl typing"></div>
        </div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;

      const textEl = document.getElementById('streaming-text');
      let i = 0;
      const interval = setInterval(() => {
        if (i < reply.length) {
          textEl.textContent = reply.substring(0, i + 1);
          i++;
          container.scrollTop = container.scrollHeight;
        } else {
          clearInterval(interval);
          textEl.classList.remove('typing');
          textEl.innerHTML = marked.parse(reply);
          
          // Save to current chat
          if (currentChatId && chats[currentChatId]) {
            chats[currentChatId].messages.push({ role: 'assistant', content: reply });
            saveChats();
          }
        }
      }, 25);
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const message = input.value.trim();
      if (!message) return;

      if (!currentChatId) newChat();

      // Add user message
      addMessageToUI('user', message);
      
      // Save user message
      chats[currentChatId].messages.push({ role: 'user', content: message });
      chats[currentChatId].title = message.substring(0, 40) + (message.length > 40 ? '...' : '');
      saveChats();
      renderChatList();

      input.value = '';
      
      // Simulate thinking delay then stream response
      setTimeout(() => {
        simulateStreamingResponse(message);
      }, 600);
    }

    function attachFile() {
      // Simulate file upload
      currentFile = "document.pdf";
      document.getElementById('file-preview').classList.remove('hidden');
      document.getElementById('file-name').textContent = currentFile;
      alert("File attached (simulation). In a real app this would upload to a server.");
    }

    function removeFile() {
      currentFile = null;
      document.getElementById('file-preview').classList.add('hidden');
    }

    function changeModel() {
      if (currentChatId) {
        chats[currentChatId].model = document.getElementById('model-select').value;
        saveChats();
      }
    }

    function toggleSettings() {
      const modal = document.getElementById('settings-modal');
      modal.classList.toggle('hidden');
    }

    function saveSettings() {
      // In real app: save to localStorage or backend
      alert("Settings saved! (Temperature & tokens would be used in actual API calls)");
    }

    // Keyboard support (Enter to send)
    document.getElementById('user-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Initialize
    window.onload = () => {
      renderChatList();
      if (Object.keys(chats).length === 0) {
        newChat();
      } else {
        // Load the most recent chat
        const latestId = Object.keys(chats).sort((a,b) => chats[b].timestamp - chats[a].timestamp)[0];
        loadChat(latestId);
      }
    };
  </script>
</body>
</html>
